name: site

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.141.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -q -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      
      - name: Install book theme
        working-directory: site
        env:
          HUGO_BOOK_THEME_COMMIT: 7c78a39c531aa2492ed7e92f2ce9dfb2c8c0d3fa
        run: |
          mkdir themes
          wget -q -O book.zip "https://github.com/alex-shpak/hugo-book/archive/${HUGO_BOOK_THEME_COMMIT}.zip"
          unzip book.zip
          mv hugo-book-* themes/hugo-book

      - name: Build with Hugo
        working-directory: site
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/London
        run: |
          mv ../docs/Controlled_Documents content
          hugo \
            --config hugo.toml \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
          rm -rf public/katex
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
